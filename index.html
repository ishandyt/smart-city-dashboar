<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스마트도시 통계 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 30px; background-color: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #007BFF; color: white; font-weight: bold; }
        tr:hover { background-color: #f1f1f1; }
        button { padding: 10px 20px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #loading-message { margin-top: 15px; font-weight: bold; color: #007BFF; }
    </style>
</head>
<body>
    <h1>📊 스마트도시 통계 분석 대시보드 (진짜 데이터 연동!)</h1>
    <p>가장 강력한 특급 배달 기사를 통해 통계청(KOSIS) 데이터를 가져옵니다.</p>

    <button onclick="fetchAndDrawTable()">진짜 데이터로 표 그리기!</button>

    <div id="loading-message"></div>
    <div id="table-container"></div>

    <script>
        async function fetchAndDrawTable() {
            const loadingBox = document.getElementById('loading-message');
            const tableBox = document.getElementById('table-container');

            loadingBox.innerText = "통계청 주방에서 데이터를 꼼꼼하게 포장해서 가져오는 중입니다... 🏃‍♂️💨";
            tableBox.innerHTML = ""; 

            // 멘티님의 진짜 KOSIS 원본 주문서(URL)
            const kosisUrl = "https://kosis.kr/openapi/Param/statisticsParameterData.do?method=getList&apiKey=NDQ1ZTU0ODVjOWM2N2MxMTg1YzI5ZWVjZDhlMGQ4NTg=&itmId=T10+T001+T002+&objL1=00+11+21+22+23+24+25+26+29+31+32+33+34+35+36+37+38+39+&objL2=&objL3=&objL4=&objL5=&objL6=&objL7=&objL8=&format=json&jsonVD=Y&prdSe=Y&startPrdDe=2020&endPrdDe=2026&outputFields=OBJ_NM+ITM_NM+UNIT_NM+PRD_DE+&orgId=101&tblId=DT_1YL20631";
            
            // 💡 수정된 핵심 부분: 가장 안정적인 allorigins의 'get' 방식을 사용합니다.
            const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(kosisUrl);

            try {
                // 1. 특급 배달 기사가 데이터를 'contents'라는 큰 박스에 이중 포장해서 가져옵니다.
                const response = await fetch(proxyUrl);
                const wrapperData = await response.json();
                
                // 2. 포장지(contents)를 뜯어서 진짜 데이터를 컴퓨터가 읽기 편하게 번역(JSON.parse)합니다.
                const data = JSON.parse(wrapperData.contents);
                
                // 3. 통계청에서 에러 쪽지를 보냈을 경우
                if (data.err || data.error || data.errMsg) {
                    loadingBox.innerText = "앗! 통계청에서 에러 쪽지를 보냈습니다: " + JSON.stringify(data);
                    return; 
                }

                loadingBox.innerText = "🎉 성공! 100% 진짜 공공데이터로 표를 그렸습니다!";

                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>연도</th>
                                <th>지자체명</th>
                                <th>항목명</th>
                                <th>수치 (통계값)</th>
                                <th>단위</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.forEach(function(item) {
                    // 데이터가 비어있으면 '-' 표시를 해줍니다.
                    const value = item.DT ? item.DT : "-";

                    tableHTML += `
                        <tr>
                            <td>${item.PRD_DE}</td>
                            <td>${item.OBJ_NM}</td>
                            <td>${item.ITM_NM}</td>
                            <td>${value}</td>
                            <td>${item.UNIT_NM}</td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                    </table>
                `;

                tableBox.innerHTML = tableHTML;

            } catch (error) {
                loadingBox.innerText = "앗! 데이터를 가져오는데 실패했어요. 😢 원인: " + error.message;
            }
        }
    </script>
</body>
</html>
