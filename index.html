<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스마트도시 통계 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 30px; background-color: #f4f6f9; }
        
        .filter-container { display: flex; align-items: flex-end; gap: 20px; background-color: white; padding: 20px 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 13px; font-weight: bold; color: #555; }
        .filter-group select { padding: 10px 15px; font-size: 15px; border: 1px solid #ccc; border-radius: 5px; outline: none; min-width: 150px; cursor: pointer; }
        
        .search-btn { padding: 11px 30px; font-size: 15px; font-weight: bold; background-color: #3b6083; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .search-btn:hover { background-color: #2c4966; }
        
        .export-btn { padding: 11px 20px; font-size: 15px; font-weight: bold; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; margin-left: auto; }
        .export-btn:hover { background-color: #218838; }

        table { width: 100%; border-collapse: collapse; background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 14px; text-align: center; font-size: 14px; }
        th { background-color: #f8f9fa; color: #333; font-weight: bold; border-bottom: 2px solid #ddd; }
        tr:hover { background-color: #f1f5f9; }
        
        #loading-message { margin-top: 15px; font-weight: bold; color: #007BFF; }
        /* 냉장고(캐시)에서 가져왔을 때 보여줄 배지 디자인 */
        .cache-badge { background-color: #ffc107; color: #333; padding: 3px 8px; border-radius: 12px; font-size: 12px; margin-left: 10px; font-weight: bold; }
        .api-badge { background-color: #17a2b8; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; margin-left: 10px; font-weight: bold; }
        
        .highlight { color: #d9534f; font-weight: bold; } 
        .positive { color: #5cb85c; font-weight: bold; } 
    </style>
</head>
<body onload="initFilters()">

    <h1>📊 스마트도시 통계 분석 대시보드 (초고속 캐싱 엔진 탑재 ⚡)</h1>
    <p>한 번 불러온 데이터는 내 컴퓨터에 임시 저장되어, 지자체를 변경해도 0.1초 만에 즉시 표시됩니다!</p>

    <div class="filter-container">
        <div class="filter-group">
            <label>광역지자체</label>
            <select id="sido" onchange="updateSigungu()"></select>
        </div>
        <div class="filter-group">
            <label>기초지자체</label>
            <select id="sigungu"></select>
        </div>
        <div class="filter-group">
            <label>시작연도</label>
            <select id="startYear"></select>
        </div>
        <div class="filter-group">
            <label>끝연도</label>
            <select id="endYear"></select>
        </div>
        <button class="search-btn" onclick="fetchAndAnalyzeData()">조회하기</button>
        <button class="export-btn" onclick="exportToCSV()">엑셀(CSV) 다운로드 📥</button>
    </div>

    <div id="loading-message"></div>
    <div id="table-container"></div>

    <script>
        const regionData = {
            "전체": ["전체"],
            "서울특별시": ["전체", "강남구", "종로구", "중구"],
            "부산광역시": ["전체", "해운대구", "수영구", "부산진구"],
            "전라남도": ["전체", "목포시", "여수시", "순천시", "나주시", "광양시", "담양군", "곡성군", "구례군", "고흥군", "보성군", "화순군", "장흥군", "강진군", "해남군", "영암군", "무안군", "함평군", "영광군", "장성군", "완도군", "진도군", "신안군"]
        };

        function initFilters() {
            const startYearSelect = document.getElementById('startYear');
            const endYearSelect = document.getElementById('endYear');
            for (let year = 2010; year <= 2026; year++) {
                startYearSelect.add(new Option(year + '년', year));
                endYearSelect.add(new Option(year + '년', year));
            }
            startYearSelect.value = "2020";
            endYearSelect.value = "2026";

            const sidoSelect = document.getElementById('sido');
            for (const sido in regionData) {
                sidoSelect.add(new Option(sido, sido));
            }
            sidoSelect.value = "전라남도"; 
            updateSigungu();
            document.getElementById('sigungu').value = "무안군";
        }

        function updateSigungu() {
            const sido = document.getElementById('sido').value;
            const sigunguSelect = document.getElementById('sigungu');
            
            sigunguSelect.innerHTML = "";
            const sigunguList = regionData[sido];
            sigunguList.forEach(name => {
                sigunguSelect.add(new Option(name, name));
            });
        }

        // 메인 함수
        async function fetchAndAnalyzeData() {
            const loadingBox = document.getElementById('loading-message');
            const tableBox = document.getElementById('table-container');

            const selectedSido = document.getElementById('sido').value;
            const selectedSigungu = document.getElementById('sigungu').value;
            const selectedStartYear = document.getElementById('startYear').value;
            const selectedEndYear = document.getElementById('endYear').value;

            // 💡 1. 냉장고(LocalStorage)에 붙일 이름표(Key)를 만듭니다. (예: kosis_2020_2026)
            const cacheKey = `kosis_${selectedStartYear}_${selectedEndYear}`;
            let rawData = null;
            let isCached = false; // 냉장고에서 꺼냈는지 확인하는 변수

            loadingBox.innerText = `[${selectedSido} ${selectedSigungu}] 데이터를 분석 중입니다... 🔍`;
            tableBox.innerHTML = ""; 

            try {
                // 💡 2. 먼저 냉장고(캐시)를 열어봅니다!
                const cachedString = localStorage.getItem(cacheKey);

                if (cachedString) {
                    // 냉장고에 데이터가 있다면? 마트(API)에 안 가고 바로 꺼내 씁니다!
                    rawData = JSON.parse(cachedString);
                    isCached = true;
                } else {
                    // 냉장고에 없으면? Vercel 터널을 통해 마트(통계청)로 뛰어갑니다.
                    const kosisUrl = `/api/kosis?method=getList&apiKey=NDQ1ZTU0ODVjOWM2N2MxMTg1YzI5ZWVjZDhlMGQ4NTg=&itmId=T10+T001+T002+&objL1=ALL&objL2=&objL3=&objL4=&objL5=&objL6=&objL7=&objL8=&format=json&jsonVD=Y&prdSe=Y&startPrdDe=${selectedStartYear}&endPrdDe=${selectedEndYear}&outputFields=OBJ_NM+ITM_NM+UNIT_NM+PRD_DE+&orgId=101&tblId=DT_1YL20631`;
                    
                    const response = await fetch(kosisUrl);
                    rawData = await response.json();
                    
                    if (rawData.err || rawData.error || rawData.errMsg) {
                        loadingBox.innerText = "앗! 통계청 쪽지: " + JSON.stringify(rawData);
                        return; 
                    }

                    // 💡 3. 새로 사 온 식재료를 다음번을 위해 냉장고에 예쁘게 포장해서 넣어둡니다.
                    localStorage.setItem(cacheKey, JSON.stringify(rawData));
                }

                // ----------------- 아래부터는 기존과 동일한 뜰채(필터링) 및 표 그리기 작업입니다 -----------------
                let data = rawData;
                if (selectedSigungu !== "전체") {
                    data = rawData.filter(item => item.OBJ_NM === selectedSigungu);
                } else if (selectedSido !== "전체") {
                    data = rawData.filter(item => item.OBJ_NM === selectedSido);
                }

                if (data.length === 0) {
                    loadingBox.innerHTML = `<span style="color:#d9534f;">😢 조회된 데이터가 없습니다.</span>`;
                    return;
                }

                const groupedData = {};
                data.forEach(item => {
                    const key = item.OBJ_NM + "_" + item.ITM_NM; 
                    if (!groupedData[key]) {
                        groupedData[key] = { region: item.OBJ_NM, item: item.ITM_NM, unit: item.UNIT_NM, years: {} };
                    }
                    groupedData[key].years[item.PRD_DE] = item.DT ? parseFloat(item.DT) : null;
                });

                let tableHTML = `
                    <table id="resultTable">
                        <thead>
                            <tr>
                                <th>지자체명</th>
                                <th>항목명</th>
                                <th>최신 기준연도</th>
                                <th>최신값</th>
                                <th>5년 전 값</th>
                                <th>5년 변화율 (%)</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                Object.values(groupedData).forEach(group => {
                    const sortedYears = Object.keys(group.years).sort((a, b) => b - a);
                    let latestYear = null;
                    let latestValue = null;

                    for (let year of sortedYears) {
                        if (group.years[year] !== null && !isNaN(group.years[year])) {
                            latestYear = year;
                            latestValue = group.years[year];
                            break; 
                        }
                    }

                    if (latestYear) {
                        const pastYear = String(parseInt(latestYear) - 5);
                        const pastValue = group.years[pastYear];
                        
                        let changeRateHTML = "비교 불가"; 
                        let pastValueDisplay = "-";

                        if (pastValue !== undefined && pastValue !== null && pastValue !== 0) {
                            pastValueDisplay = pastValue.toLocaleString() + " " + group.unit;
                            const changeRate = ((latestValue - pastValue) / pastValue) * 100;
                            
                            if(changeRate > 0) {
                                changeRateHTML = `<span class="positive">▲ ${changeRate.toFixed(2)}%</span>`;
                            } else if(changeRate < 0) {
                                changeRateHTML = `<span class="highlight">▼ ${Math.abs(changeRate).toFixed(2)}%</span>`;
                            } else {
                                changeRateHTML = `<span>0.00%</span>`;
                            }
                        }

                        tableHTML += `
                            <tr>
                                <td>${group.region}</td>
                                <td>${group.item}</td>
                                <td style="font-weight:bold; color:#3b6083;">${latestYear}년</td>
                                <td>${latestValue.toLocaleString()} ${group.unit}</td>
                                <td>${pastValueDisplay}</td>
                                <td>${changeRateHTML}</td>
                            </tr>
                        `;
                    }
                });

                tableHTML += `</tbody></table>`;
                tableBox.innerHTML = tableHTML;
                
                // 화면 안내 문구 표시 (어디서 가져왔는지 알려줌)
                if (isCached) {
                    loadingBox.innerHTML = `🎉 ${selectedSido} ${selectedSigungu} 데이터 조회 완료! <span class="cache-badge">⚡ 브라우저 임시저장소(캐시)에서 0.1초 만에 불러옴</span>`;
                } else {
                    loadingBox.innerHTML = `🎉 ${selectedSido} ${selectedSigungu} 데이터 조회 완료! <span class="api-badge">☁️ 통계청 서버에서 최신 데이터 가져옴</span>`;
                }

            } catch (error) {
                loadingBox.innerText = "앗! 데이터를 분석하는 중 문제가 발생했습니다. 😢 원인: " + error.message;
            }
        }

        function exportToCSV() {
            const table = document.getElementById("resultTable");
            if (!table) {
                alert("먼저 [조회하기] 버튼을 눌러 데이터를 불러와 주세요!");
                return;
            }
            let csvContent = "\uFEFF"; 
            const rows = table.querySelectorAll("tr");
            rows.forEach(row => {
                const cols = row.querySelectorAll("th, td");
                const rowData = Array.from(cols).map(col => `"${col.innerText}"`);
                csvContent += rowData.join(",") + "\n";
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "스마트도시_통계분석.csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
